# PowerSync sync rules — paste this into the "Sync Rules" editor in your
# PowerSync project dashboard at app.powersync.com
#
# These rules define what data gets synced to each authenticated user's device.
# A user syncs all data belonging to their company.

bucket_definitions:
  company_data:
    # Derive the company_id for the authenticated user
    parameters: SELECT company_id FROM profiles WHERE id = request.user_id()
    data:
      - SELECT id, company_id, customer_id, job_number, title, description,
               status, assigned_to, site_id, quote_id, tags, created_at, updated_at
          FROM jobs
         WHERE company_id = bucket.company_id

      - SELECT id, company_id, name, email, phone
          FROM customers
         WHERE company_id = bucket.company_id

      - SELECT id, company_id, customer_id, name, address
          FROM customer_sites
         WHERE company_id = bucket.company_id

      - SELECT id, job_id, assigned_to, scheduled_start, scheduled_end, status, notes
          FROM job_visits
          JOIN jobs ON jobs.id = job_visits.job_id
         WHERE jobs.company_id = bucket.company_id

      - SELECT id, company_id, job_id, profile_id, added_at
          FROM job_assignees
         WHERE company_id = bucket.company_id

      - SELECT id, job_id, author_id, body, created_at
          FROM job_notes
          JOIN jobs ON jobs.id = job_notes.job_id
         WHERE jobs.company_id = bucket.company_id

      - SELECT id, company_id, job_id, profile_id, started_at, ended_at,
               break_minutes, bill_rate, cost_rate, is_billable
          FROM timesheets
         WHERE company_id = bucket.company_id

      - SELECT id, company_id, job_id, description, quantity, unit,
               unit_cost, unit_price, price_list_item_id, supplier, supplier_invoice_number, created_at
          FROM job_materials
         WHERE company_id = bucket.company_id

      - SELECT id, company_id, name, fields, is_active
          FROM form_templates
         WHERE company_id = bucket.company_id

      - SELECT id, job_id, template_id, template_name, answers, submitted_at, submitted_by
          FROM form_submissions
          JOIN jobs ON jobs.id = form_submissions.job_id
         WHERE jobs.company_id = bucket.company_id

      - SELECT id, company_id, name, unit, sell_price, cost_price, type, is_active
          FROM price_list_items
         WHERE company_id = bucket.company_id
           AND is_active = true
