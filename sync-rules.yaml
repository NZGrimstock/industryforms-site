# PowerSync sync streams for IndustryForms — upload via PowerSync Dashboard
# → Sync Rules. (Edition 3 = sync streams, replaces bucket_definitions.)
#
# Role-aware (mirrors web RLS from migration 031):
#   • owner/admin  → full company dataset
#   • staff        → company reference data + only their primary or secondary jobs
#                    and own time/travel. Never quotes/invoices.
#
# auth.user_id() is the Supabase JWT `sub`. Streams require JOINs to use
# simple equality (no `IN ('owner','admin')` literal lists, no IN-subqueries)
# so role checks are written with OR.

config:
  edition: 3

streams:
  # ── Owner & admin: full company dataset ─────────────────────────────────
  admin_company:
    auto_subscribe: true
    queries:
      - SELECT jobs.*               FROM jobs               INNER JOIN profiles ON profiles.company_id = jobs.company_id               WHERE profiles.id = auth.user_id() AND (profiles.role = 'owner' OR profiles.role = 'admin')
      - SELECT customers.*          FROM customers          INNER JOIN profiles ON profiles.company_id = customers.company_id          WHERE profiles.id = auth.user_id() AND (profiles.role = 'owner' OR profiles.role = 'admin')
      - SELECT customer_sites.*     FROM customer_sites     INNER JOIN profiles ON profiles.company_id = customer_sites.company_id     WHERE profiles.id = auth.user_id() AND (profiles.role = 'owner' OR profiles.role = 'admin')
      - SELECT job_visits.*         FROM job_visits         INNER JOIN profiles ON profiles.company_id = job_visits.company_id         WHERE profiles.id = auth.user_id() AND (profiles.role = 'owner' OR profiles.role = 'admin')
      - SELECT job_assignees.*      FROM job_assignees      INNER JOIN profiles ON profiles.company_id = job_assignees.company_id      WHERE profiles.id = auth.user_id() AND (profiles.role = 'owner' OR profiles.role = 'admin')
      - SELECT job_notes.*          FROM job_notes          INNER JOIN profiles ON profiles.company_id = job_notes.company_id          WHERE profiles.id = auth.user_id() AND (profiles.role = 'owner' OR profiles.role = 'admin')
      - SELECT timesheets.*         FROM timesheets         INNER JOIN profiles ON profiles.company_id = timesheets.company_id         WHERE profiles.id = auth.user_id() AND (profiles.role = 'owner' OR profiles.role = 'admin')
      - SELECT job_materials.*      FROM job_materials      INNER JOIN profiles ON profiles.company_id = job_materials.company_id      WHERE profiles.id = auth.user_id() AND (profiles.role = 'owner' OR profiles.role = 'admin')
      - SELECT form_templates.*     FROM form_templates     INNER JOIN profiles ON profiles.company_id = form_templates.company_id     WHERE profiles.id = auth.user_id() AND (profiles.role = 'owner' OR profiles.role = 'admin')
      - SELECT form_submissions.*   FROM form_submissions   INNER JOIN profiles ON profiles.company_id = form_submissions.company_id   WHERE profiles.id = auth.user_id() AND (profiles.role = 'owner' OR profiles.role = 'admin')
      - SELECT price_list_items.*   FROM price_list_items   INNER JOIN profiles ON profiles.company_id = price_list_items.company_id   WHERE profiles.id = auth.user_id() AND (profiles.role = 'owner' OR profiles.role = 'admin')
      - SELECT travel_logs.*        FROM travel_logs        INNER JOIN profiles ON profiles.company_id = travel_logs.company_id        WHERE profiles.id = auth.user_id() AND (profiles.role = 'owner' OR profiles.role = 'admin')
      - SELECT quotes.*             FROM quotes             INNER JOIN profiles ON profiles.company_id = quotes.company_id             WHERE profiles.id = auth.user_id() AND (profiles.role = 'owner' OR profiles.role = 'admin')
      - SELECT quote_sections.*     FROM quote_sections     INNER JOIN profiles ON profiles.company_id = quote_sections.company_id     WHERE profiles.id = auth.user_id() AND (profiles.role = 'owner' OR profiles.role = 'admin')
      - SELECT quote_line_items.*   FROM quote_line_items   INNER JOIN profiles ON profiles.company_id = quote_line_items.company_id   WHERE profiles.id = auth.user_id() AND (profiles.role = 'owner' OR profiles.role = 'admin')
      - SELECT invoices.*           FROM invoices           INNER JOIN profiles ON profiles.company_id = invoices.company_id           WHERE profiles.id = auth.user_id() AND (profiles.role = 'owner' OR profiles.role = 'admin')
      - SELECT invoice_line_items.* FROM invoice_line_items INNER JOIN profiles ON profiles.company_id = invoice_line_items.company_id WHERE profiles.id = auth.user_id() AND (profiles.role = 'owner' OR profiles.role = 'admin')
      - SELECT job_photos.*         FROM job_photos         INNER JOIN profiles ON profiles.company_id = job_photos.company_id         WHERE profiles.id = auth.user_id() AND (profiles.role = 'owner' OR profiles.role = 'admin')

  # ── Staff: company-wide reference data needed on every job ──────────────
  staff_reference:
    auto_subscribe: true
    queries:
      - SELECT customers.*        FROM customers        INNER JOIN profiles ON profiles.company_id = customers.company_id        WHERE profiles.id = auth.user_id() AND profiles.role = 'staff'
      - SELECT customer_sites.*   FROM customer_sites   INNER JOIN profiles ON profiles.company_id = customer_sites.company_id   WHERE profiles.id = auth.user_id() AND profiles.role = 'staff'
      - SELECT price_list_items.* FROM price_list_items INNER JOIN profiles ON profiles.company_id = price_list_items.company_id WHERE profiles.id = auth.user_id() AND profiles.role = 'staff'
      - SELECT form_templates.*   FROM form_templates   INNER JOIN profiles ON profiles.company_id = form_templates.company_id   WHERE profiles.id = auth.user_id() AND profiles.role = 'staff'

  # ── Staff: assigned jobs + their children ───────────────────────────────
  staff_jobs:
    auto_subscribe: true
    queries:
      - SELECT * FROM jobs WHERE assigned_to = auth.user_id()
      - SELECT jobs.* FROM jobs INNER JOIN job_assignees ON job_assignees.job_id = jobs.id WHERE job_assignees.profile_id = auth.user_id()
      - SELECT job_visits.*       FROM job_visits       INNER JOIN jobs ON jobs.id = job_visits.job_id       WHERE jobs.assigned_to = auth.user_id()
      - SELECT job_visits.*       FROM job_visits       INNER JOIN job_assignees ON job_assignees.job_id = job_visits.job_id WHERE job_assignees.profile_id = auth.user_id()
      - SELECT job_assignees.*    FROM job_assignees    WHERE job_assignees.profile_id = auth.user_id()
      - SELECT job_notes.*        FROM job_notes        INNER JOIN jobs ON jobs.id = job_notes.job_id        WHERE jobs.assigned_to = auth.user_id()
      - SELECT job_notes.*        FROM job_notes        INNER JOIN job_assignees ON job_assignees.job_id = job_notes.job_id WHERE job_assignees.profile_id = auth.user_id()
      - SELECT job_materials.*    FROM job_materials    INNER JOIN jobs ON jobs.id = job_materials.job_id    WHERE jobs.assigned_to = auth.user_id()
      - SELECT job_materials.*    FROM job_materials    INNER JOIN job_assignees ON job_assignees.job_id = job_materials.job_id WHERE job_assignees.profile_id = auth.user_id()
      - SELECT job_photos.*       FROM job_photos       INNER JOIN jobs ON jobs.id = job_photos.job_id       WHERE jobs.assigned_to = auth.user_id()
      - SELECT job_photos.*       FROM job_photos       INNER JOIN job_assignees ON job_assignees.job_id = job_photos.job_id WHERE job_assignees.profile_id = auth.user_id()
      - SELECT form_submissions.* FROM form_submissions INNER JOIN jobs ON jobs.id = form_submissions.job_id WHERE jobs.assigned_to = auth.user_id()
      - SELECT form_submissions.* FROM form_submissions INNER JOIN job_assignees ON job_assignees.job_id = form_submissions.job_id WHERE job_assignees.profile_id = auth.user_id()

  # ── Staff: own time only ────────────────────────────────────────────────
  staff_self:
    auto_subscribe: true
    queries:
      - SELECT * FROM timesheets  WHERE profile_id = auth.user_id()
      - SELECT * FROM travel_logs WHERE profile_id = auth.user_id()
